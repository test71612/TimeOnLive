<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>مؤقت العد التنازلي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

html, body {
  width: 100%;
  height: 100%;
  background: transparent; 
  overflow: hidden;
}

#stage{
  width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
  position:relative;
}

/* ══ LOGIN BUTTON ══ */
#login-btn{
  position: fixed;
  top: 20px;
  left: 20px;
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size: 16px;
  color: #fff;
  background: rgba(67, 9, 41, 0.6);
  padding: 8px 20px;
  border-radius: 10px;
  border: 3px solid #430929;
  cursor: pointer;
  transition: all 0.2s ease;
  z-index: 100;
}

#login-btn:hover {
  background: rgba(67, 9, 41, 0.9);
}

#login-btn.logged-in {
  background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
  border-color: #1a5928;
}

/* ══ IDLE PHASE (زر البدء) ══ */
#ph-idle{
  position:absolute;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  transition: opacity 0.4s ease;
  z-index: 20;
}
#ph-idle.out{opacity:0;pointer-events:none}

.start-btn{
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:clamp(28px, 6vw, 50px);
  color: #fff;
  background: linear-gradient(135deg, #f26735 0%, #d4562a 100%);
  padding: 16px 60px;
  border-radius: 20px;
  border: 6px solid #430929;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: all 0.2s ease;
}

.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.start-btn:active {
  transform: scale(0.98);
}

/* ══ WAITING PHASE (شاشة فارغة) ══ */
#ph-waiting{
  position:absolute;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.4s ease;
  z-index: 20;
}
#ph-waiting.active{opacity:1;pointer-events:all}

/* ══ TIMER PHASE ══ */
#ph-timer{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap: 40px;
  opacity:0;
  pointer-events:none;
  transform: translateX(-100vw); 
  transition:
    opacity 0.6s ease,
    transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
}
#ph-timer.active{
  opacity:1;
  pointer-events:all;
  transform: translateX(0); 
}

.bar-scene{ 
  width:96vw; 
  max-width: 1200px;
  position:relative;
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.pop-active {
  transform: scale(1.03);
}

.bar-outer{
  width:100%;
  height:clamp(120px, 30vh, 240px); 
  background: rgba(0,0,0,0.5); 
  border-radius:30px;
  position:relative;
  overflow:hidden;
  border: 8px solid #430929; 
  box-shadow: 0 15px 50px rgba(0,0,0,0.6);
}

.bar-outer.admin-mode {
  cursor: pointer;
}

#bar-fill{
  position:absolute;
  top:0;right:0;
  height:100%;
  width:100%;
  border-radius:20px;
  background: linear-gradient(to left, #d4562a 0%, #f26735 50%, #ff8c61 100%);
  transform-origin:right center;
  transition: width 1s linear;
}

#t-n{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(80px, 18vh, 180px); 
  color: #fff;
  letter-spacing:10px;
  z-index:10;
  -webkit-text-stroke: 8px #430929;
  paint-order: stroke fill;
  text-shadow: 6px 6px 15px rgba(0,0,0,0.8);
  pointer-events: none;
}

.reset-btn{
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:clamp(18px, 4vw, 28px);
  color: #fff;
  background: rgba(67, 9, 41, 0.8);
  padding: 12px 40px;
  border-radius: 15px;
  border: 4px solid #430929;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: all 0.2s ease;
}

.reset-btn:hover {
  background: rgba(67, 9, 41, 1);
  transform: scale(1.05);
}

.reset-btn:active {
  transform: scale(0.98);
}

/* ══ DONE ══ */
#ph-done{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap: 30px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.7s;
}
#ph-done.active{opacity:1;pointer-events:all}

.dn-word{
  font-family:'Cairo',sans-serif;
  font-weight:900;
  font-size:clamp(60px,18vw,160px);
  color: #f26735;
  -webkit-text-stroke: 10px #430929;
  paint-order: stroke fill;
  text-shadow: 6px 6px 15px rgba(0,0,0,0.5);
}

/* ══ TIME OPTIONS ══ */
.time-options{
  display:flex;
  gap: 20px;
  margin-top: 20px;
}

.time-btn{
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:clamp(18px, 4vw, 24px);
  color: #fff;
  background: rgba(67, 9, 41, 0.8);
  padding: 12px 30px;
  border-radius: 15px;
  border: 4px solid #430929;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  cursor: pointer;
  transition: all 0.2s ease;
}

.time-btn:hover {
  background: rgba(67, 9, 41, 1);
  transform: scale(1.05);
}

.time-btn.selected {
  background: linear-gradient(135deg, #f26735 0%, #d4562a 100%);
  border-color: #f26735;
}

/* ══ ADMIN CONTROLS ══ */
.admin-only {
  display: none !important;
}

.admin-mode .admin-only {
  display: flex !important;
}

/* ══ ADD TIME HINT ══ */
.add-hint {
  font-family:'Cairo',sans-serif;
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-top: -30px;
}

</style>
</head>
<body>

<!-- زر تسجيل الدخول -->
<button id="login-btn">تسجيل دخول</button>

<div id="stage">
  <!-- مرحلة البدء -->
  <div id="ph-idle" class="admin-only">
    <button class="start-btn" id="start-btn">ابدأ</button>
    <div class="time-options">
      <button class="time-btn selected" id="time-5">5 دقائق</button>
      <button class="time-btn" id="time-3">3 دقائق</button>
    </div>
  </div>

  <!-- مرحلة الانتظار (شاشة فارغة) -->
  <div id="ph-waiting">
  </div>

  <!-- مرحلة المؤقت -->
  <div id="ph-timer">
    <div class="bar-scene" id="timer-container">
      <div class="bar-outer" id="bar-outer">
        <div id="bar-fill"></div>
        <div id="t-n">5:00</div>
      </div>
    </div>
    <span class="add-hint admin-only" id="add-hint">اضغط على الشريط لإضافة دقيقة</span>
    <button class="reset-btn admin-only" id="reset-btn-timer">العودة للبداية</button>
  </div>

  <!-- مرحلة الانتهاء -->
  <div id="ph-done">
    <div class="dn-word">انتهى الوقت</div>
    <button class="start-btn admin-only" id="restart-btn">إعادة</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD = "1234"; // كلمة السر للمتحكم

let TOTAL = 300; // 5 دقائق (افتراضي)
const WAITING_TIME = 15; // 15 ثانية انتظار

const loginBtn = document.getElementById('login-btn');
const phIdle = document.getElementById('ph-idle');
const phWaiting = document.getElementById('ph-waiting');
const phTimer = document.getElementById('ph-timer');
const phDone = document.getElementById('ph-done');
const timerCont = document.getElementById('timer-container');
const barOuter = document.getElementById('bar-outer');
const tN = document.getElementById('t-n');
const barFill = document.getElementById('bar-fill');
const startBtn = document.getElementById('start-btn');
const resetBtnTimer = document.getElementById('reset-btn-timer');
const restartBtn = document.getElementById('restart-btn');
const time5Btn = document.getElementById('time-5');
const time3Btn = document.getElementById('time-3');

let actx = null;
let timerInterval = null;
let waitingTimeout = null;
let timeLeft = TOTAL;
let initialTotal = TOTAL;
let isAdmin = false;

function getCtx(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  return actx;
}

function tone(freq, dur, vol){
  try {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.frequency.setValueAtTime(freq, c.currentTime);
    g.gain.setValueAtTime(vol, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g); g.connect(c.destination);
    o.start(); o.stop(c.currentTime + dur);
  } catch(e){}
}

function fmt(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function updateAdminUI() {
  if(isAdmin) {
    document.body.classList.add('admin-mode');
    loginBtn.textContent = 'متحكم';
    loginBtn.classList.add('logged-in');
    barOuter.classList.add('admin-mode');
  } else {
    document.body.classList.remove('admin-mode');
    loginBtn.textContent = 'تسجيل دخول';
    loginBtn.classList.remove('logged-in');
    barOuter.classList.remove('admin-mode');
  }
}

// زر تسجيل الدخول
loginBtn.addEventListener('click', () => {
  if(isAdmin) {
    // تسجيل خروج
    isAdmin = false;
    updateAdminUI();
  } else {
    const pass = prompt('أدخل كلمة السر:');
    if(pass === ADMIN_PASSWORD) {
      isAdmin = true;
      updateAdminUI();
      tone(500, 0.1, 0.1);
    } else if(pass !== null) {
      alert('كلمة السر خاطئة!');
    }
  }
});

// اختيار 5 دقائق
time5Btn.addEventListener('click', () => {
  if(!isAdmin) return;
  tone(300, 0.05, 0.05);
  TOTAL = 300;
  time5Btn.classList.add('selected');
  time3Btn.classList.remove('selected');
  tN.textContent = fmt(TOTAL);
});

// اختيار 3 دقائق
time3Btn.addEventListener('click', () => {
  if(!isAdmin) return;
  tone(300, 0.05, 0.05);
  TOTAL = 180;
  time3Btn.classList.add('selected');
  time5Btn.classList.remove('selected');
  tN.textContent = fmt(TOTAL);
});

// زر البدء
startBtn.addEventListener('click', () => {
  if(!isAdmin) return;
  tone(300, 0.1, 0.1);
  initialTotal = TOTAL;
  timeLeft = TOTAL;
  barFill.style.width = '100%';
  tN.textContent = fmt(TOTAL);
  phIdle.classList.add('out');
  phWaiting.classList.add('active');
  
  // انتظار 15 ثانية ثم بدء المؤقت
  waitingTimeout = setTimeout(() => {
    phWaiting.classList.remove('active');
    launchTimer();
  }, WAITING_TIME * 1000);
});

// الضغط على الشريط لإضافة دقيقة (للمتحكم فقط)
barOuter.addEventListener('click', () => {
  if(!isAdmin) return;
  tone(500, 0.1, 0.1);
  timeLeft += 60;
  initialTotal += 60;
  tN.textContent = fmt(timeLeft);
  barFill.style.width = (timeLeft / initialTotal * 100) + '%';
  
  // أنيماشن Pop
  timerCont.classList.add('pop-active');
  setTimeout(() => {
    timerCont.classList.remove('pop-active');
  }, 200);
});

// زر العودة للبداية أثناء المؤقت
resetBtnTimer.addEventListener('click', () => {
  if(!isAdmin) return;
  resetAll();
});

// زر إعادة بعد الانتهاء
restartBtn.addEventListener('click', () => {
  if(!isAdmin) return;
  resetAll();
});

function resetAll() {
  tone(250, 0.1, 0.1);
  
  // إيقاف أي مؤقتات
  if(timerInterval) clearInterval(timerInterval);
  if(waitingTimeout) clearTimeout(waitingTimeout);
  
  // إعادة تعيين الشريط
  barFill.style.width = '100%';
  tN.textContent = fmt(TOTAL);
  timeLeft = TOTAL;
  initialTotal = TOTAL;
  
  // إخفاء جميع المراحل
  phWaiting.classList.remove('active');
  phTimer.classList.remove('active');
  phDone.classList.remove('active');
  
  // إظهار مرحلة البدء
  phIdle.classList.remove('out');
}

function launchTimer() {
  phTimer.classList.add('active');
  startCountdown();
}

function startCountdown() {
  timerInterval = setInterval(() => {
    timeLeft--;
    tN.textContent = fmt(timeLeft);
    barFill.style.width = (timeLeft / initialTotal * 100) + '%';
    if(timeLeft > 0) tone(600, 0.05, 0.1);
    if(timeLeft <= 0) {
      clearInterval(timerInterval);
      tone(800, 0.5, 0.3);
      phTimer.classList.remove('active');
      setTimeout(() => phDone.classList.add('active'), 600);
    }
  }, 1000);
}

document.addEventListener('click', () => { if(actx) actx.resume(); }, {once: true});
</script>

</body>
</html>
